name: Otomatik Emlak Tarama

on:
  schedule:
    - cron: '*/15 * * * *' # Her 15 dakikada bir çalıştır
  workflow_dispatch: # Manuel tetikleme butonu ekler

jobs:
  tara_ve_kaydet:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v4

    - name: Python 3.11 Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Gerekli Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright beautifulsoup4 playwright-stealth
       playwright install --with-deps chromium

    - name: Botu Çalıştır (İlanları Çek)
      run: python main.py

    - name: Hafızayı Kaydet ve Güncelle
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add hafiza.txt
        # Hafıza dosyasına yeni ilan eklendiyse, bunu depoya otomatik kaydet
        git diff --quiet && git diff --staged --quiet || (git commit -m "Hafıza güncellendi" && git push)
