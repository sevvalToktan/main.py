name: Emlak Botu

on:
  schedule:
    - cron: "*/15 * * * *"   # Her 15 dakikada bir çalışır
  workflow_dispatch:          # Elle de başlatılabilir

jobs:
  tara:
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # nodriver ve playwright için gerekli sistem kütüphaneleri
      - name: Sistem bağımlılıklarını kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            libglib2.0-0 \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2

      - name: Python paketlerini kur
        run: pip install playwright playwright-stealth requests beautifulsoup4 nodriver

      - name: Playwright tarayıcısını kur
        run: playwright install chromium

      - name: Hafıza dosyasını indir (varsa)
        uses: actions/cache@v4
        with:
          path: hafiza.txt
          key: hafiza-${{ github.run_id }}
          restore-keys: hafiza-

      - name: Botu çalıştır
        run: python main.py

      - name: Hafıza dosyasını kaydet
        uses: actions/cache@v4
        with:
          path: hafiza.txt
          key: hafiza-${{ github.run_id }}
