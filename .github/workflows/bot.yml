name: Otomatik Emlak Tarama

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  tara_ve_kaydet:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Kopyala
        uses: actions/checkout@v4

      - name: Python 3.11 Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sistem Bağımlılıklarını Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            libglib2.0-0 libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright beautifulsoup4 playwright-stealth nodriver
          playwright install --with-deps chromium

      - name: Botu Çalıştır (İlanları Çek)
        run: python main.py

      - name: Hafızayı Kaydet ve Güncelle
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add hafiza.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Hafıza güncellendi" && git push)
